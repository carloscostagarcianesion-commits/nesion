name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install Development Dependencies
        run: pip install -e ".[dev]"
      - name: Static Analysis (Ruff)
        run: ruff check nesion/ tests/ scripts/
      - name: Type Checking (MyPy)
        run: mypy nesion/
      - name: Verify Build
        run: |
          pip install build
          python -m build

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install Nesion and Test Dependencies
        run: pip install -e ".[dev]"
      - name: Pytest Unit & Integration Suite
        run: pytest tests/ -v
